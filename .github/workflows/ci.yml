name: CI

# Se ejecuta en cada PR contra main o develop,
# y también en push directo a develop (solo posible para admins)
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:

  # ── 1. Build y tests unitarios ─────────────────────────────────────────────
  test:
    name: Build y tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests unitarios
        # LibraryAgentApplicationTests requiere contexto Spring completo (DB + Redis)
        # Se excluye aquí y se ejecutará en los tests de integración (Fase 3)
        run: mvn test -Dtest='!LibraryAgentApplicationTests'
        env:
          ANTHROPIC_API_KEY: test-api-key

  # ── 2. Análisis de vulnerabilidades en dependencias y Dockerfile ───────────
  trivy:
    name: Vulnerabilidades (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Escanear dependencias y Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # ── 3. Detección de secretos expuestos ────────────────────────────────────
  gitleaks:
    name: Secretos expuestos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para escanear todo el historial

      - name: Escanear secretos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Lint del Dockerfile ────────────────────────────────────────────────
  hadolint:
    name: Lint Dockerfile (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analizar Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Analizar Dockerfile del dashboard
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dashboard/Dockerfile

  # ── 5. Build del dashboard Next.js ───────────────────────────────────────
  build-dashboard:
    name: Build dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        run: npm run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret
          AUTH_AUTHENTIK_ID: ci-client-id
          AUTH_AUTHENTIK_SECRET: ci-client-secret
          AUTH_AUTHENTIK_ISSUER: https://auth.mistborn.cv/application/o/libraryagent/
          NEXT_PUBLIC_API_URL: http://localhost:8080/library-agent
