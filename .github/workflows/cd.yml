name: CD

# Se ejecuta en cada push a main (es decir, al mergear una PR)
on:
  push:
    branches: [main]

jobs:

  deploy:
    name: Deploy a roshar
    runs-on: [self-hosted, linux, roshar]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Parar contenedores existentes
        run: |
          docker compose -p libraryagent -f docker-compose.prod.yml down --remove-orphans || true
          docker rm -f libraryagent-app libraryagent-redis 2>/dev/null || true

      - name: Build y arrancar contenedores
        run: |
          docker compose -p libraryagent -f docker-compose.prod.yml \
            --env-file /opt/libraryagent/.env.prod \
            up -d --build

      - name: Health check
        run: |
          echo "Esperando a que Spring Boot arranque..."
          for i in $(seq 1 12); do
            if docker exec libraryagent-app bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' 2>/dev/null; then
              echo "Aplicación respondiendo en puerto 8080"
              exit 0
            fi
            echo "Intento $i/12 — esperando 10s..."
            sleep 10
          done
          echo "Health check fallido tras 2 minutos"
          docker logs libraryagent-app --tail 30
          exit 1
