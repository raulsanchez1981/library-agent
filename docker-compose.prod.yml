services:

  app:
    # Fase 3.5: se reemplazará por image: ghcr.io/raulsanchez1981/library-agent:${APP_VERSION}
    build: .
    container_name: libraryagent-app
    restart: unless-stopped
    environment:
      DB_HOST: 192.168.1.102
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - libraryagent-net

  redis:
    image: redis:7-alpine
    container_name: libraryagent-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - libraryagent-net

volumes:
  redis_data:

networks:
  libraryagent-net:
    driver: bridge