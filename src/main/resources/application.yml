server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:libraryagent}
    username: ${DB_USERNAME:libraryagent}
    password: ${DB_PASSWORD:libraryagent}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

ingestion:
  pullpush:
    subreddits:
      Fantasy: "fantasía épica"
      printSF: "ciencia ficción"
      suggestmeabook: "literatura general"
      booksuggestions: "literatura general"
    posts-size: 25

anthropic:
  api-key: ${ANTHROPIC_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.libraryagent: INFO
    org.flywaydb: INFO
