spring:
  datasource:
    # Usa el PostgreSQL de docker-compose (localhost:5432)
    # Testcontainers JDBC no funciona con Docker Desktop 4.34+ en Windows
    # (los named pipes devuelven Status 400 vacío desde la JVM)
    # Alternativa: habilitar TCP en Docker Desktop Settings → "Expose daemon on tcp://localhost:2375"
    url: jdbc:postgresql://localhost:5432/libraryagent
    username: libraryagent
    password: libraryagent
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  # jwk-set-uri override para evitar que Spring intente contactar al issuer de Authentik.
  # Spring Security carga las claves de forma lazy: solo cuando llega un JWT real.
  # Los tests de seguridad usan MockMvc + jwt() post-processor que no pasa por el JwtDecoder.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/.well-known/jwks.json

anthropic:
  api-key: test-api-key

logging:
  level:
    com.libraryagent: DEBUG
