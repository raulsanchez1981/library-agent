spring:
  datasource:
    url: jdbc:tc:postgresql:16:///libraryagent
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.libraryagent: DEBUG
