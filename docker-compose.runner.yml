services:

  github-runner:
    image: myoung34/github-runner:latest
    container_name: github-runner
    restart: unless-stopped
    environment:
      REPO_URL: https://github.com/raulsanchez1981/library-agent
      RUNNER_NAME: roshar-runner
      ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN}
      RUNNER_WORKDIR: /tmp/github-runner
      LABELS: self-hosted,linux,roshar
    volumes:
      # Acceso al socket Docker para que el runner pueda ejecutar docker compose
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_work:/tmp/github-runner
      # El runner necesita acceder al .env.prod del proyecto
      - /opt/libraryagent:/opt/libraryagent:ro

volumes:
  runner_work: